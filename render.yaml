# render.yaml - Gooaye Whisper API
specVersion: 1

services:
  - type: web_service
    name: gooaye-whisper
    runtime: python
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "10000"
      - key: PYTHON_VERSION
        value: "3.11"
      - key: G_TOKEN
        sync: false
      - key: G_CLIENT
        sync: false